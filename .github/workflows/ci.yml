name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements.txt
      - run: pip install -r tools/requirements.txt
      - name: Validate entries
        run: python tools/validate_entries.py
      - name: Check README in sync with entries
        run: python tools/build_readme.py --check
      - name: Quick link-check (touched URLs)
        run: python tools/linkcheck.py --quick
        continue-on-error: false
