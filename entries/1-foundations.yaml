# Category: Foundations — the machinery before the model.
# Edit only YAML; the README is regenerated.

- id: tokenizer-bpe
  category: foundations
  order: 1
  title: "Tokenizer (BPE)"
  what_you_build: "A byte-pair-encoding tokenizer that turns raw text into a vocabulary of subword tokens — the same idea that powers GPT-class tokenizers."
  teaches: ["subword tokenization", "vocab construction", "merges"]
  understanding: "Why models see tokens, not characters or words — and why that single decision shapes every downstream cost and behavior."
  difficulty: 2
  guides:
    - title: "minbpe"
      url: "https://github.com/karpathy/minbpe"
      author: "Andrej Karpathy"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Implements `BasicTokenizer`, `RegexTokenizer`, and `GPT4Tokenizer` from first principles — tiktoken is only imported in tests for cross-validation, never as the implementation."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "Let's build the GPT Tokenizer"
      url: "https://www.youtube.com/watch?v=zduSFxRajkE"
      author: "Andrej Karpathy"
      kind: video
      language: "Python"
      cost: free
      from_scratch_evidence: "Companion lecture for `minbpe`; codes BPE merges step by step from an empty file in the video."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: embedding-layer
  category: foundations
  order: 2
  title: "Embedding layer"
  what_you_build: "A learned lookup table that maps token IDs to dense vectors — the entry point every modern LM shares."
  teaches: ["lookup tables", "dense representations", "tied vs untied embeddings"]
  understanding: "How discrete tokens become differentiable vectors, why dimensionality choices matter, and why the same matrix often ties to the output head."
  difficulty: 1
  guides:
    - title: "Word2vec from Scratch (NumPy)"
      url: "https://jaketae.github.io/study/word2vec/"
      author: "Jake Tae"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Implements Skip-gram in pure NumPy — sliding-window context generation, the matrix update rules, and the embedding extraction. No `gensim`, no `nn.Embedding`."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "word2vec-pytorch (reproduction of the original paper)"
      url: "https://github.com/OlgaChernytska/word2vec-pytorch"
      author: "Olga Chernytska"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Hand-written CBOW and Skip-gram modules in PyTorch (no `gensim`, no third-party embedding library). README explicitly documents every deviation from the original paper, which is the signature of educational reproduction."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: autograd-micro
  category: foundations
  order: 3
  title: "Autograd / micro-framework"
  what_you_build: "A scalar-valued autograd engine with reverse-mode differentiation — the kernel of PyTorch/JAX in ~150 lines."
  teaches: ["computational graphs", "reverse-mode autodiff", "the chain rule in code"]
  understanding: "Why neural networks are 'just' big differentiable functions, and what every deep-learning framework is doing under the hood."
  difficulty: 2
  guides:
    - title: "micrograd"
      url: "https://github.com/karpathy/micrograd"
      author: "Andrej Karpathy"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "~100 lines of autograd + ~50 lines of an `nn` module — implements reverse-mode autodiff over a DAG of scalar `Value`s, no PyTorch dependency for the engine itself."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: backprop-by-hand
  category: foundations
  order: 4
  title: "Backprop by hand on an MLP"
  what_you_build: "A multi-layer perceptron trained on a toy task with gradients computed manually, then verified against autograd."
  teaches: ["chain rule", "gradient flow", "vanishing/exploding gradients"]
  understanding: "The gradient flow through every layer — so 'why is loss not going down' stops being a black box."
  difficulty: 2
  guides:
    - title: "Neural Networks: Zero to Hero (lectures 1–4)"
      url: "https://github.com/karpathy/nn-zero-to-hero"
      author: "Andrej Karpathy"
      kind: course
      language: "Python"
      cost: free
      from_scratch_evidence: "Lecture 1 builds micrograd from an empty file; lectures 2–4 (makemore) implement an MLP and walk through manual backward passes — Lecture 4 is literally titled 'Becoming a Backprop Ninja' and computes every gradient by hand."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: layer-normalization
  category: foundations
  order: 5
  title: "Layer normalization (LN, RMSNorm)"
  what_you_build: "LayerNorm and RMSNorm implemented from scratch — the normalization that sits inside every transformer block."
  teaches: ["mean / variance normalization", "learnable scale and shift", "RMSNorm's simplification"]
  understanding: "Why every modern transformer block sandwiches sub-layers with normalization — and what the gain / bias parameters are doing."
  difficulty: 1
  guides:
    - title: "Layer Normalization (annotated PyTorch implementation)"
      url: "https://nn.labml.ai/normalization/layer_norm/index.html"
      author: "labml.ai"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Implements LayerNorm by computing mean / variance / scale / shift directly with PyTorch primitives — no `nn.LayerNorm`. Annotated against the original paper."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: weight-init
  category: foundations
  order: 6
  title: "Weight initialization (Xavier / Kaiming)"
  what_you_build: "Xavier (Glorot) and Kaiming (He) initialization from scratch — derived from the variance-preservation requirement and verified empirically by tracking activation variance across layers."
  teaches: ["activation variance propagation", "fan-in / fan-out", "why ReLU needs Kaiming and tanh needs Xavier"]
  understanding: "Why a deep net's loss explodes-then-flattens with naive `randn` init, and why the right initializer keeps gradients alive through 50+ layers."
  difficulty: 1
  guides:
    - title: "Tutorial 3: Initialization and Optimization (UvA Deep Learning)"
      url: "https://lightning.ai/docs/pytorch/stable/notebooks/course_UvA-DL/03-initialization-and-optimization.html"
      author: "Phillip Lippe (UvA / PyTorch Lightning)"
      kind: course
      language: "Python"
      cost: free
      from_scratch_evidence: "Implements constant, variance-based, Xavier, and Kaiming initializers as hand-written `nn.init` calls plus a custom variance-tracking experiment — derives `Var(W) = 1/d_x` from the input-variance-preserving requirement, then shows the activation-vanishing failure mode that motivates each scheme. No reliance on `nn.Module`'s default init."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: dropout
  category: foundations
  order: 7
  title: "Dropout"
  what_you_build: "Inverted dropout from scratch — Bernoulli masking, the 1/(1−p) scale at training time, and the eval-mode passthrough."
  teaches: ["Bernoulli masking", "inverted vs vanilla dropout", "train vs eval mode"]
  understanding: "Why dropout is regularization, why the scale factor lives at train time (not eval), and why monitoring train/val gap is the only way to set p."
  difficulty: 1
  guides:
    - title: "Regularization from Scratch — Dropout"
      url: "https://nilanjanchattopadhyay.github.io/basics/2020/04/20/Regularization-from-Scratch-Dropout.html"
      author: "Nilanjan Chattopadhyay"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Custom `Dropout` module: `torch.zeros(...).bernoulli_(1-p)` mask, explicit `H1 = (Output * DropoutMask) / (1 - self.Dropout)` inverted-dropout scaling at training, and `if self.training` branch for eval-mode passthrough — exactly what `nn.Dropout` hides. PyTorch's built-in is shown afterward for contrast, not as the implementation."
      verified_on: 2026-05-14
      verifier: "bettyguo"
