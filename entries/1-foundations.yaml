# Category: Foundations — the machinery before the model.
# Edit only YAML; the README is regenerated.

- id: tokenizer-bpe
  category: foundations
  order: 1
  title: "Tokenizer (BPE)"
  what_you_build: "A byte-pair-encoding tokenizer that turns raw text into a vocabulary of subword tokens — the same idea that powers GPT-class tokenizers."
  teaches: ["subword tokenization", "vocab construction", "merges"]
  understanding: "Why models see tokens, not characters or words — and why that single decision shapes every downstream cost and behavior."
  difficulty: 2
  guides:
    - title: "minbpe"
      url: "https://github.com/karpathy/minbpe"
      author: "Andrej Karpathy"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Implements `BasicTokenizer`, `RegexTokenizer`, and `GPT4Tokenizer` from first principles — tiktoken is only imported in tests for cross-validation, never as the implementation."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "Let's build the GPT Tokenizer"
      url: "https://www.youtube.com/watch?v=zduSFxRajkE"
      author: "Andrej Karpathy"
      kind: video
      language: "Python"
      cost: free
      from_scratch_evidence: "Companion lecture for `minbpe`; codes BPE merges step by step from an empty file in the video."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: embedding-layer
  category: foundations
  order: 2
  title: "Embedding layer"
  what_you_build: "A learned lookup table that maps token IDs to dense vectors — the entry point every modern LM shares."
  teaches: ["lookup tables", "dense representations", "tied vs untied embeddings"]
  understanding: "How discrete tokens become differentiable vectors, why dimensionality choices matter, and why the same matrix often ties to the output head."
  difficulty: 1
  guides:
    - title: "Word2vec from Scratch (NumPy)"
      url: "https://jaketae.github.io/study/word2vec/"
      author: "Jake Tae"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Implements Skip-gram in pure NumPy — sliding-window context generation, the matrix update rules, and the embedding extraction. No `gensim`, no `nn.Embedding`."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "word2vec-pytorch (reproduction of the original paper)"
      url: "https://github.com/OlgaChernytska/word2vec-pytorch"
      author: "Olga Chernytska"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Hand-written CBOW and Skip-gram modules in PyTorch (no `gensim`, no third-party embedding library). README explicitly documents every deviation from the original paper, which is the signature of educational reproduction."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: autograd-micro
  category: foundations
  order: 3
  title: "Autograd / micro-framework"
  what_you_build: "A scalar-valued autograd engine with reverse-mode differentiation — the kernel of PyTorch/JAX in ~150 lines."
  teaches: ["computational graphs", "reverse-mode autodiff", "the chain rule in code"]
  understanding: "Why neural networks are 'just' big differentiable functions, and what every deep-learning framework is doing under the hood."
  difficulty: 2
  guides:
    - title: "micrograd"
      url: "https://github.com/karpathy/micrograd"
      author: "Andrej Karpathy"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "~100 lines of autograd + ~50 lines of an `nn` module — implements reverse-mode autodiff over a DAG of scalar `Value`s, no PyTorch dependency for the engine itself."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: backprop-by-hand
  category: foundations
  order: 4
  title: "Backprop by hand on an MLP"
  what_you_build: "A multi-layer perceptron trained on a toy task with gradients computed manually, then verified against autograd."
  teaches: ["chain rule", "gradient flow", "vanishing/exploding gradients"]
  understanding: "The gradient flow through every layer — so 'why is loss not going down' stops being a black box."
  difficulty: 2
  guides:
    - title: "Neural Networks: Zero to Hero (lectures 1–4)"
      url: "https://github.com/karpathy/nn-zero-to-hero"
      author: "Andrej Karpathy"
      kind: course
      language: "Python"
      cost: free
      from_scratch_evidence: "Lecture 1 builds micrograd from an empty file; lectures 2–4 (makemore) implement an MLP and walk through manual backward passes — Lecture 4 is literally titled 'Becoming a Backprop Ninja' and computes every gradient by hand."
      verified_on: 2026-05-14
      verifier: "bettyguo"
