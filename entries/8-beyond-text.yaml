# Category: Beyond Text вЂ” vision, audio, multimodal.

- id: vision-transformer
  category: beyond-text
  order: 1
  title: "Vision Transformer (ViT)"
  what_you_build: "A Vision Transformer from scratch вЂ” patch embedding, transformer encoder over patches, classification head вЂ” trained on CIFAR-10 or similar."
  teaches: ["images as a sequence of patches", "class token", "transformer encoder applied to vision"]
  understanding: "Why 'an image is worth 16Г—16 words' вЂ” and why the same transformer that does language can do vision once you tokenize pixels."
  difficulty: 2
  guides:
    - title: "vision-transformer-from-scratch"
      url: "https://github.com/tintn/vision-transformer-from-scratch"
      author: "Tin Nguyen"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "`vit.py` defines `ViTForImageClassification` containing the patch embedding, transformer encoder, and classification head вЂ” all in pure PyTorch primitives. Companion blog post on Towards Data Science walks through every layer."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: diffusion-ddpm
  category: beyond-text
  order: 2
  title: "Diffusion model (DDPM)"
  what_you_build: "A toy image diffusion model вЂ” forward noising, reverse denoising, training a U-Net to predict noise."
  teaches: ["forward / reverse processes", "score / noise prediction", "the variance schedule"]
  understanding: "Why a model trained to predict noise can generate images, and how DDPM/DDIM/etc. relate."
  difficulty: 3
  guides:
    - title: "denoising-diffusion-pytorch"
      url: "https://github.com/lucidrains/denoising-diffusion-pytorch"
      author: "Phil Wang (lucidrains)"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Custom `Unet` + `GaussianDiffusion` classes implementing DDPM from the Ho et al. paper вЂ” no `diffusers` library dependency for the core forward/reverse process."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "Hugging Face Diffusion Models Course (Unit 1: Introduction)"
      url: "https://huggingface.co/learn/diffusion-course/unit0/1"
      author: "Jonathan Whitaker, Lewis Tunstall (Hugging Face)"
      kind: course
      language: "Python"
      cost: free
      from_scratch_evidence: "Unit 1 syllabus explicitly states 'Introduction to рџ¤— Diffusers and implementation from 0' вЂ” the from-scratch notebook predates the `diffusers`-based unit."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: latent-diffusion
  category: beyond-text
  order: 3
  title: "Latent diffusion (Stable Diffusion-style)"
  what_you_build: "A latent diffusion model вЂ” VAE encoder/decoder + a UNet diffusion model that runs in the VAE's latent space, plus text conditioning via CLIP вЂ” the recipe behind Stable Diffusion."
  teaches: ["why latent space (compute, not pixels)", "VAE encode/decode", "classifier-free guidance"]
  understanding: "Why Stable Diffusion is fast: it diffuses in a 64Г—64 latent space, not a 512Г—512 pixel space вЂ” and what the VAE / UNet / CLIP play in the trade-off."
  difficulty: 3
  guides:
    - title: "Latent Diffusion Models (annotated PyTorch implementation)"
      url: "https://nn.labml.ai/diffusion/stable_diffusion/latent_diffusion.html"
      author: "labml.ai"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Annotated implementation of the Latent Diffusion Models paper. Custom `Autoencoder`, `UNetModel`, and `CLIPTextEmbedder` modules вЂ” no `diffusers` library. Pair the autoencoder + UNet exactly as Stable Diffusion does."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: clip
  category: beyond-text
  order: 4
  title: "CLIP-style contrastive model"
  what_you_build: "A small dual-encoder (image + text) trained with an InfoNCE contrastive loss вЂ” multimodal alignment from scratch."
  teaches: ["contrastive learning", "InfoNCE", "modality alignment"]
  understanding: "How a single embedding space can host both modalities, and why CLIP-style models underpin most modern multimodal systems."
  difficulty: 3
  guides:
    - title: "Simple Implementation of OpenAI CLIP model"
      url: "https://github.com/moein-shariatnia/OpenAI-CLIP"
      author: "Moein Shariatnia"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Separate `ImageEncoder` + `TextEncoder` + `ProjectionHead` modules in PyTorch, contrastive loss written explicitly with cross-entropy вЂ” uses `timm`/`transformers` only for the backbone vision/text encoders, the CLIP objective itself is from scratch."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: asr-ctc
  category: beyond-text
  order: 5
  title: "Speech recognition (CTC)"
  what_you_build: "A toy automatic-speech-recognition model: audio features в†’ encoder в†’ CTC loss в†’ greedy decoding."
  teaches: ["audio feature extraction (mel-spectrogram)", "CTC alignment", "blank-token decoding"]
  understanding: "How variable-length audio aligns to text without forced alignment, and why CTC is still the workhorse loss for ASR."
  difficulty: 3
  guides:
    - title: "Building an End-to-End Speech Recognition Model in PyTorch"
