# Category: Inference — making a trained model useful.

- id: sampling
  category: inference
  order: 1
  title: "Sampling (greedy / temp / top-k / top-p)"
  what_you_build: "Decoding-strategy functions: greedy, temperature, top-k, nucleus (top-p) — and a side-by-side comparison on the same prompt."
  teaches: ["argmax vs sampling", "temperature scaling", "nucleus sampling"]
  understanding: "Why the same model can sound creative or robotic depending entirely on three lines of decoding code."
  difficulty: 1
  guides:
    - title: "Decoding Strategies in Large Language Models"
      url: "https://huggingface.co/blog/mlabonne/decoding-strategies"
      author: "Maxime Labonne"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Hand-written `greedy_search`, `beam_search`, `top_k_sampling`, `nucleus_sampling` functions — each is a few lines of PyTorch over the raw logits, no `model.generate` shortcut. Companion notebook with decision-tree visualizations."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: kv-cache
  category: inference
  order: 2
  title: "KV cache"
  what_you_build: "A key/value cache that turns O(n²) decoding into O(n) — by far the biggest single inference optimization."
  teaches: ["incremental decoding", "cache layout", "memory vs time trade-off"]
  understanding: "Why the second token is faster than the first, and why long contexts blow up memory."
  difficulty: 2
  guides:
    - title: "Understanding and Coding the KV Cache in LLMs from Scratch"
      url: "https://magazine.sebastianraschka.com/p/coding-the-kv-cache-in-llms"
      author: "Sebastian Raschka"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Side-by-side comparison of two self-contained scripts (`gpt_ch04.py` without cache, `gpt_with_kv_cache.py` with) — the cache is written explicitly in PyTorch, ~5× speedup measured."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "KV Cache from scratch in nanoVLM"
      url: "https://huggingface.co/blog/kv-cache"
      author: "Aritra Roy Gosthipaty, Kashif Rasul, Pedro Cuenca et al. (Hugging Face)"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Walks through implementing per-layer KV caching in the nanoVLM attention block — prefill/decode separation written by hand, achieves 38% speedup."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: inference-engine
  category: inference
  order: 3
  title: "Minimal inference engine"
  what_you_build: "A `generate()` loop with batching, padding, stop tokens, and the KV cache — what llama.cpp / vLLM do at their core."
  teaches: ["batched generation", "padding masks", "stop conditions"]
  understanding: "What makes an inference engine fast and where the production complexity actually lives."
  difficulty: 3
  guides:
    - title: "llama2.c"
      url: "https://github.com/karpathy/llama2.c"
      author: "Andrej Karpathy"
      kind: code
      language: "C"
      cost: free
      from_scratch_evidence: "700-line `run.c` implements LLaMA-2 inference end to end in pure C: tokenizer, transformer forward, KV cache, sampling — no external ML library."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: speculative-decoding
  category: inference
  order: 4
  title: "Speculative decoding"
  what_you_build: "A draft + verify decoder: a small fast model proposes tokens, the target model checks them in parallel."
  teaches: ["draft models", "rejection sampling", "acceptance rate"]
  understanding: "How modern inference stacks get 2–3× throughput without changing the target model."
  difficulty: 3
  guides:
    - title: "Speculative-Decoding (Leviathan et al. 2023, PyTorch)"
      url: "https://github.com/romsto/Speculative-Decoding"
      author: "Romain Storaï"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "PyTorch implementation of the original Leviathan et al. paper — both classic autoregressive and speculative decoding are written from scratch, side by side, so the speedup is measurable."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: watermarking
  category: inference
  order: 5
  title: "LLM watermarking"
  what_you_build: "A token-level watermark: bias decoding toward a pseudo-random 'green' subset of the vocabulary at each step, then a statistical detector that recovers the watermark with interpretable p-values — the Kirchenbauer et al. recipe."
  teaches: ["seeded vocabulary partitioning", "green / red token bias at decode time", "statistical detection via z-scores"]
  understanding: "How model outputs can be tagged in a way that's detectable but doesn't change human-perceived quality — and where the watermark breaks under paraphrasing."
  difficulty: 3
  guides:
    - title: "lm-watermarking (official Kirchenbauer et al. implementation)"
      url: "https://github.com/jwkirchenbauer/lm-watermarking"
      author: "John Kirchenbauer (paper authors)"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Canonical implementation of 'A Watermark for Large Language Models' (ICML 2023 Outstanding Paper). `WatermarkLogitsProcessor` and `WatermarkDetector` implement the green/red-list partitioning and z-score detection in PyTorch — the abstraction wraps HF's `LogitsProcessor` interface but the watermark logic itself is hand-written."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "LMWatermark (educational PyTorch re-implementation)"
      url: "https://github.com/BrianPulfer/LMWatermark"
      author: "Brian Pulfer"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Independent re-implementation of the Kirchenbauer & Geiping et al. watermarking technique — useful as a second pass for cross-checking the official code's behavior."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: quantization
  category: inference
  order: 6
  title: "Quantization (INT8 / INT4)"
  what_you_build: "Post-training quantization of a small LM to INT8 and INT4 — with the accuracy/throughput trade-off measured."
  teaches: ["weight-only quantization", "per-channel scales", "outliers and clipping"]
  understanding: "Why 4-bit inference is the default for local deployment, and what it actually costs."
  difficulty: 3
  guides:
    - title: "Introduction to Weight Quantization"
      url: "https://towardsdatascience.com/introduction-to-weight-quantization-2494701b9c0c/"
      author: "Maxime Labonne"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Implements `absmax_quantize` and `zeropoint_quantize` from scratch in PyTorch — scale + zero-point calculation, the quantize/dequantize functions, accuracy comparison. `bitsandbytes` is introduced *afterwards* for contrast, not as the implementation."
      verified_on: 2026-05-14
      verifier: "bettyguo"
