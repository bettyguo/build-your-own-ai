# Category: Training — how models learn.

- id: training-loop
  category: training
  order: 1
  title: "Training loop"
  what_you_build: "A complete training loop: data loader, forward pass, loss, optimizer step, eval, checkpointing — the mechanics every book glosses over."
  teaches: ["mini-batching", "loss/eval logging", "checkpointing"]
  understanding: "Why training infrastructure is most of the work even when the model code is a few hundred lines."
  difficulty: 2
  guides:
    - title: "A full training loop — Hugging Face LLM Course (Ch 3.4)"
      url: "https://huggingface.co/learn/llm-course/chapter3/4"
      author: "Hugging Face"
      kind: course
      language: "Python"
      cost: free
      from_scratch_evidence: "Section explicitly drops the `Trainer` API and writes the loop by hand: dataloader iteration, manual `optimizer.zero_grad / loss.backward / optimizer.step`, gradient accumulation, mixed precision."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "nanoGPT — `train.py`"
      url: "https://github.com/karpathy/nanoGPT/blob/master/train.py"
      author: "Andrej Karpathy"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "~300-line training loop: data iteration, AMP, gradient accumulation, cosine LR schedule, DDP — all written explicitly, no `Trainer` or `accelerate.Trainer` wrapper."
      verified_on: 2026-05-14
      verifier: "bettyguo"

