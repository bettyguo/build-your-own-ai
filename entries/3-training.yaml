# Category: Training — how models learn.

- id: training-loop
  category: training
  order: 1
  title: "Training loop"
  what_you_build: "A complete training loop: data loader, forward pass, loss, optimizer step, eval, checkpointing — the mechanics every book glosses over."
  teaches: ["mini-batching", "loss/eval logging", "checkpointing"]
  understanding: "Why training infrastructure is most of the work even when the model code is a few hundred lines."
  difficulty: 2
  guides:
    - title: "A full training loop — Hugging Face LLM Course (Ch 3.4)"
      url: "https://huggingface.co/learn/llm-course/chapter3/4"
      author: "Hugging Face"
      kind: course
      language: "Python"
      cost: free
      from_scratch_evidence: "Section explicitly drops the `Trainer` API and writes the loop by hand: dataloader iteration, manual `optimizer.zero_grad / loss.backward / optimizer.step`, gradient accumulation, mixed precision."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "nanoGPT — `train.py`"
      url: "https://github.com/karpathy/nanoGPT/blob/master/train.py"
      author: "Andrej Karpathy"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "~300-line training loop: data iteration, AMP, gradient accumulation, cosine LR schedule, DDP — all written explicitly, no `Trainer` or `accelerate.Trainer` wrapper."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: optimizer-from-scratch
  category: training
  order: 2
  title: "Optimizer (SGD → Adam → AdamW)"
  what_you_build: "SGD with momentum, then Adam, then AdamW — implemented from scratch and compared on the same toy problem."
  teaches: ["momentum", "adaptive learning rates", "weight decay vs L2"]
  understanding: "Why AdamW dominates LLM pretraining and what every term in the update rule is doing."
  difficulty: 2
  guides:
    - title: "Adam Optimizer (annotated PyTorch implementation)"
      url: "https://nn.labml.ai/optimizers/adam.html"
      author: "labml.ai"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Subclasses `torch.optim.Optimizer` and writes Adam's update rule by hand — first-moment, second-moment, bias correction, parameter update — all annotated against the paper's equations."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: lr-schedule
  category: training
  order: 3
  title: "Learning-rate schedule"
  what_you_build: "Linear warmup + cosine decay schedule, plotted against loss curves on a small training run."
  teaches: ["warmup", "cosine decay", "schedule interaction with batch size"]
  understanding: "Why almost every modern run uses this exact shape and how badly things break without warmup."
  difficulty: 1
  guides: []
  gap: true

- id: mixed-precision
  category: training
  order: 4
  title: "Mixed precision + gradient accumulation"
  what_you_build: "FP16/BF16 forward pass with FP32 master weights, plus gradient accumulation to simulate large batches on small GPUs."
  teaches: ["dtype trade-offs", "loss scaling", "effective batch size"]
  understanding: "The practical scaling tricks that turn a 'too big to fit' run into one you can actually do."
  difficulty: 2
  guides: []
  gap: true

- id: sft
  category: training
  order: 5
  title: "Supervised fine-tuning (SFT)"
  what_you_build: "Fine-tune a small base LM on an instruction dataset — the first half of every modern post-training pipeline."
  teaches: ["instruction following", "loss masking on prompts", "learning rate for SFT"]
  understanding: "Why the same base model can become a chatbot, a coding assistant, or a math tutor depending purely on the SFT data."
  difficulty: 2
  guides:
    - title: "Build a Large Language Model (From Scratch) — Chapter 7: Instruction fine-tuning"
      url: "https://github.com/rasbt/LLMs-from-scratch/tree/main/ch07"
      author: "Sebastian Raschka"
      kind: book
      language: "Python"
      cost: paid
      from_scratch_evidence: "Chapter 7 fine-tunes the GPT model built in earlier chapters on Alpaca-style instructions — pure PyTorch SFT loop, custom loss masking on prompts, no `transformers.Trainer` or TRL `SFTTrainer`."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: reward-model
  category: training
  order: 6
  title: "Reward model"
  what_you_build: "Train a reward model on pairwise preference data — the scoring function that drives every RLHF-style pipeline."
  teaches: ["pairwise ranking loss", "preference data", "reward hacking"]
  understanding: "How human preferences become a differentiable signal — and why this single object is RLHF's most fragile component."
  difficulty: 3
  guides: []
  gap: true
  original_planned: true

- id: dpo
  category: training
  order: 7
  title: "DPO / preference tuning"
  what_you_build: "A Direct Preference Optimization loop that aligns a model from preferences alone — no separate reward model, no RL."
  teaches: ["DPO loss", "implicit reward", "reference model KL"]
  understanding: "Why DPO replaced RLHF for many teams, and the trade-offs it makes."
  difficulty: 3
  guides:
    - title: "DPO from scratch (LLMs-from-scratch Ch 7.4)"
      url: "https://github.com/rasbt/LLMs-from-scratch/blob/main/ch07/04_preference-tuning-with-dpo/dpo-from-scratch.ipynb"
      author: "Sebastian Raschka"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Notebook companion to the LLMs-from-scratch book; implements the DPO loss (log-ratio of policy vs reference) directly in PyTorch — no TRL `DPOTrainer`."
      verified_on: 2026-05-14
      verifier: "bettyguo"

