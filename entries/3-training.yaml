- id: mixed-precision
  category: training
  order: 4
  title: "Mixed precision + gradient accumulation"
  what_you_build: "FP16/BF16 forward pass with FP32 master weights, plus gradient accumulation to simulate large batches on small GPUs."
  teaches: ["dtype trade-offs", "loss scaling", "effective batch size"]
  understanding: "The practical scaling tricks that turn a 'too big to fit' run into one you can actually do."
  difficulty: 2
  guides:
    - title: "Mixed Precision Training from Scratch"
      url: "https://tspeterkim.github.io/posts/mixed-precision-from-scratch"
      author: "Taeksang Peter Kim"
      kind: written
      language: "Mixed"
      cost: free
      from_scratch_evidence: "Goes below `torch.cuda.amp.autocast` to implement the three primitives — loss scaling, FP32 master weights, and mixed-precision matmul — with custom CUDA kernels via cuBLAS to reveal what AMP actually does."
      verified_on: 2026-05-14
      verifier: "bettyguo"

