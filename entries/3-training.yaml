- id: lora
  category: training
  order: 7
  title: "LoRA / parameter-efficient fine-tuning"
  what_you_build: "A LoRA (low-rank adapter) layer from scratch — two low-rank matrices bolted onto a frozen pretrained linear layer — and a fine-tune that updates < 1% of parameters."
  teaches: ["low-rank decomposition", "frozen vs trainable parameters", "alpha / rank scaling"]
  understanding: "Why a 4096×4096 weight matrix can be adapted with ~65k extra parameters, and what that buys (and costs) compared with full fine-tuning."
  difficulty: 2
  guides:
    - title: "Build a Large Language Model (From Scratch) — Appendix E: Parameter-efficient Finetuning with LoRA"
      url: "https://github.com/rasbt/LLMs-from-scratch/tree/main/appendix-E"
      author: "Sebastian Raschka"
      kind: book
      language: "Python"
      cost: paid
      from_scratch_evidence: "Companion code to the book's LoRA appendix — implements `LoRALayer` and `LinearWithLoRA` in pure PyTorch, swaps them into the chapter-7 fine-tuning loop, no `peft` library."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "LoRA (Jake Tae)"
      url: "https://jaketae.github.io/study/lora/"
      author: "Jake Tae"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Hand-written `LoRALinear` class implementing the two low-rank matrices + the scaling factor; trained on MNIST to show the parameter-count reduction in action. No `peft` import."
      verified_on: 2026-05-14
      verifier: "bettyguo"

