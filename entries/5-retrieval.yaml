# Category: Retrieval — external memory for LMs.

- id: bm25
  category: retrieval
  order: 1
  title: "BM25 from scratch"
  what_you_build: "Lexical retrieval scoring — the classical TF-IDF descendant that still wins on many real benchmarks."
  teaches: ["term frequency", "inverse document frequency", "length normalization"]
  understanding: "Why the boring lexical baseline is hard to beat — and why pure vector search alone is rarely enough."
  difficulty: 1
  guides:
    - title: "Quick Introduction to Okapi BM25"
      url: "https://ethen8181.github.io/machine-learning/search/bm25_intro.html"
      author: "Ethen Liu"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Builds a custom `BM25` class with `fit` and `score` methods — term frequency, document frequency, IDF, and length normalization all written by hand, no `rank_bm25` import."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: vector-search
  category: retrieval
  order: 2
  title: "Vector search (brute force → HNSW)"
  what_you_build: "A brute-force nearest-neighbor index, then a from-scratch HNSW implementation — the algorithm behind most vector databases."
  teaches: ["L2 / cosine", "approximate vs exact NN", "HNSW graph construction"]
  understanding: "What every vector DB is actually doing in its hot path, and where the speed comes from."
  difficulty: 2
  guides:
    - title: "HNSW (tutorial implementation)"
      url: "https://github.com/brtholomy/hnsw"
      author: "brtholomy"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Readable Python implementation that mirrors the original paper's pseudocode — `Insert` and `SearchLayer` are written by hand, performance is sacrificed for clarity. Not using `hnswlib` / `faiss`."
      verified_on: 2026-05-14
      verifier: "bettyguo"
    - title: "Hierarchical Navigable Small Worlds (HNSW)"
      url: "https://www.pinecone.io/learn/series/faiss/hnsw/"
      author: "Pinecone Learn"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Walks the algorithm from skip-lists → navigable small-world → hierarchical — the conceptual companion to a from-scratch implementation. (Pair with brtholomy/hnsw for code.)"
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: hybrid-search
  category: retrieval
  order: 3
  title: "Hybrid search (BM25 + vector)"
  what_you_build: "A retriever that combines BM25 and dense scores — with Reciprocal Rank Fusion and learned weighting compared head to head."
  teaches: ["score fusion", "RRF", "lexical / semantic complementarity"]
  understanding: "Why production retrieval is almost never one model — and how the fusion choices change recall."
  difficulty: 2
  guides:
    - title: "Hybrid retrieval with reciprocal rank fusion: solving the score normalization problem"
      url: "https://avchauzov.github.io/blog/2025/hybrid-retrieval-rrf-rank-fusion/"
      author: "Andrey Chauzov"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Author explicitly says: 'RRF is integrated into many vector databases, but let's implement it from scratch to understand the mechanics.' Hand-written `reciprocal_rank_fusion(...)` function combines a BM25 ranked list and a vector ranked list — no Elasticsearch / Qdrant / Weaviate built-in fusion."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: reranker
  category: retrieval
  order: 4
  title: "Reranker (cross-encoder)"
  what_you_build: "A cross-encoder that scores (query, document) pairs — trained from scratch on a small relevance dataset."
  teaches: ["bi-encoder vs cross-encoder", "two-stage retrieval", "training relevance models"]
  understanding: "Why the best retrieval pipelines are always 'retrieve cheap, rerank expensive,' and what that actually buys you."
  difficulty: 2
  guides: []
  gap: true
  original_planned: true

- id: retrieval-evaluation
  category: retrieval
  order: 5
  title: "Retrieval evaluation (Recall@K, MRR, NDCG)"
  what_you_build: "A small evaluation kit that scores a retriever's output against a labeled set — Recall@K, Mean Reciprocal Rank, MAP@K, and NDCG@K, all from primitives."
  teaches: ["binary vs graded relevance", "rank-aware metrics", "averaging across queries"]
  understanding: "Why 'top-3 looks right' isn't an evaluation — and what each metric tells you that the others don't (recall is set-level; MRR cares only about the first hit; NDCG weights position with diminishing returns)."
  difficulty: 1
  guides:
    - title: "Evaluation Measures in Information Retrieval"
      url: "https://www.pinecone.io/learn/offline-evaluation/"
      author: "Pinecone Learn"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Hand-implements Recall@K, MRR, MAP@K, and NDCG@K in Python — variable initialization, loops, reciprocal-rank computation, DCG / IDCG / normalization. No `pytrec_eval` / `ranx` shortcut."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: rag-pipeline
  category: retrieval
  order: 6
  title: "End-to-end RAG pipeline (no frameworks)"
  what_you_build: "Chunk → embed → retrieve → answer, in plain Python — no LangChain, no LlamaIndex, no vector DB SDK."
  teaches: ["chunking strategies", "context stuffing", "answer grounding"]
  understanding: "What RAG frameworks actually do, why most of the value is in the chunking + retrieval + prompt, and where they hide complexity."
  difficulty: 2
  guides:
    - title: "Code a simple RAG from scratch"
      url: "https://huggingface.co/blog/ngxson/make-your-own-rag"
      author: "Xuan-Son Nguyen (ngxson)"
      kind: written
      language: "Python"
      cost: free
      from_scratch_evidence: "Builds the vector DB as a plain Python list, writes `cosine_similarity` from first principles, no LangChain / LlamaIndex / Chroma — just `ollama` for the local model calls."
      verified_on: 2026-05-14
      verifier: "bettyguo"

- id: graphrag
  category: retrieval
  order: 7
  title: "GraphRAG"
  what_you_build: "Microsoft's GraphRAG pipeline from scratch — chunk → entity & relationship extraction with an LLM → knowledge-graph construction → Leiden community detection → community summarization → query-focused answer synthesis."
  teaches: ["entity / relation extraction with structured LLM prompts", "community detection on knowledge graphs", "global vs local retrieval over a graph"]
  understanding: "Why graph-structured retrieval beats vanilla RAG on multi-hop and aggregation questions — and what the full GraphRAG paper actually does, end to end, without the framework."
  difficulty: 3
  guides:
    - title: "example-graphrag (end-to-end GraphRAG pipeline from scratch)"
      url: "https://github.com/stephenc222/example-graphrag"
      author: "Stephen Collins"
      kind: code
      language: "Python"
      cost: free
      from_scratch_evidence: "Implements the 'From Local to Global: A Graph RAG Approach' paper directly: `extract_elements_from_chunks` (LLM entity extraction), `detect_communities` (Leiden algorithm on the graph), `summarize_communities`, and `answer_query` — all as standalone Python functions in `app.py`. Does NOT use Microsoft's `graphrag` library; the algorithm is in the repo, not imported."
      verified_on: 2026-05-14
      verifier: "bettyguo"
